<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #2b5876, #4e4376);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .form-container:hover {
            transform: translateY(-5px);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: background 0.3s, box-shadow 0.3s;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background: linear-gradient(135deg, #0072ff, #00c6ff);
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(0, 198, 255, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        #message {
            margin-top: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            min-height: 20px;
        }

        .success {
            color: #4ade80;
        }

        .error {
            color: #f87171;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h1>Add User</h1>
        <form id="addUserForm">
            <div class="input-group">
                <label for="userId">User ID</label>
                <input type="number" id="userId" name="id" placeholder="Enter ID" required>
            </div>
            <div class="input-group">
                <label for="userName">Name</label>
                <input type="text" id="userName" name="name" placeholder="Enter Name" required>
            </div>
            <button type="submit">Create User</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        document.getElementById('addUserForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const id = document.getElementById('userId').value;
            const name = document.getElementById('userName').value;
            const messageEl = document.getElementById('message');

            try {
                const response = await fetch('/user', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        id: parseInt(id),
                        name: name
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    messageEl.textContent = result.message || 'Successfully created!';
                    messageEl.className = 'success';
                    document.getElementById('addUserForm').reset();
                } else {
                    messageEl.textContent = 'Error creating user.';
                    messageEl.className = 'error';
                }
            } catch (error) {
                messageEl.textContent = 'Network error occurred.';
                messageEl.className = 'error';
                console.error('Error:', error);
            }
        });
    </script>
</body>

</html>
